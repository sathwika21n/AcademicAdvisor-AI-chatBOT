<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DegreePath Advisor</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">AI Academic Advisor</p>
        <h1>DegreePath Advisor</h1>
        <p class="subhead">
          Build a 4-year roadmap, check prerequisites, discover electives, and audit graduation progress.
        </p>
      </section>

      <section class="profile-panel">
        <h2>Student Profile</h2>
        <div class="directory-toolbar">
          <input id="collegeSearchInput" type="text" placeholder="Search U.S. colleges (e.g., Arizona State)" />
          <button id="collegeSearchBtn" type="button">Search Schools</button>
          <span id="directoryStatus" class="directory-status">Loading directory...</span>
        </div>
        <div id="schoolResults" class="school-results" aria-label="School search results"></div>
        <div class="profile-grid">
          <label>Major
            <select id="majorInput"></select>
          </label>
          <label>Current Year
            <input id="yearInput" type="text" placeholder="Freshman / Sophomore..." />
          </label>
          <label class="full">Interests
            <input id="interestsInput" type="text" placeholder="AI, cybersecurity, data..." />
          </label>
          <label class="full">Completed Courses (comma-separated)
            <input id="completedInput" type="text" placeholder="CS101, MATH101, ENG101" />
          </label>
        </div>
        <div class="quick-actions">
          <button class="quick-btn" type="button" data-message="Build my 4-year degree schedule.">Plan 4-Year Schedule</button>
          <button class="quick-btn" type="button" data-message="Check prerequisites for CS220 and CS310.">Check Prerequisites</button>
          <button class="quick-btn" type="button" data-message="Suggest electives based on my interests.">Suggest Electives</button>
          <button class="quick-btn" type="button" data-message="Audit my graduation requirements.">Graduation Audit</button>
        </div>
      </section>

      <section class="chat-panel">
        <div id="chatLog" class="chat-log" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <label for="chatInput" class="sr-only">Type your message</label>
          <textarea
            id="chatInput"
            rows="2"
            placeholder="Ask about plans, prerequisites, electives, or graduation..."
            maxlength="1200"
            required
          ></textarea>
          <button id="sendBtn" type="submit">Send</button>
        </form>
      </section>
    </main>

    <template id="bubbleTemplate">
      <article class="bubble-wrap">
        <p class="bubble"></p>
      </article>
    </template>

    <script src="/static/app.js"></script>
  </body>
</html>
